<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Gender</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e6e9ef, #f7f8fa);
            color: #1f2937;
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #111827;
        }
        .gender-buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .gender-button {
            background-color: #ffffff;
            color: #374151;
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 2px solid #d1d5db;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 150px;
            text-align: center;
            text-decoration: none;
        }
        .gender-button:hover {
            background-color: #3b82f6;
            color: #ffffff;
            border-color: #1d4ed8;
            transform: scale(1.05);
        }
        @media (max-width: 400px) {
            .gender-button {
                padding: 0.75rem 1.5rem;
                font-size: 1rem;
                max-width: 120px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select Your Gender</h1>
        <div class="gender-buttons">
            <a href="https://bestideamobi.blogspot.com" class="gender-button" data-gender="male">Male</a>
            <a href="https://bestideamobi.blogspot.com" class="gender-button" data-gender="female">Female</a>
        </div>
    </div>
</body>
</html>
